<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lewis Family Meal OS</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e0b;
    --surface: #1a1915;
    --surface2: #242320;
    --border: #2e2c28;
    --accent: #e8b84b;
    --accent2: #c97b3a;
    --text: #f0ece3;
    --text-muted: #8a8578;
    --green: #5a8f6a;
    --red: #c45c3a;
    --blue: #4a7fa5;
    --tag-chicken: #a05c2a;
    --tag-taco: #4a7a3a;
    --tag-fish: #2a5a7a;
    --tag-pasta: #6a4a8a;
    --tag-burger: #7a3a3a;
    --tag-shabbat: #8a7a2a;
    --tag-veg: #3a7a5a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 24px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
    backdrop-filter: blur(8px);
  }

  .logo {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }

  .logo-title {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 900;
    letter-spacing: -0.5px;
    color: var(--accent);
  }

  .logo-sub {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .week-nav {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .week-label {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 1px;
    min-width: 140px;
    text-align: center;
  }

  .nav-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    width: 32px;
    height: 32px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .nav-btn:hover { background: var(--surface); border-color: var(--accent); color: var(--accent); }

  .generate-btn {
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 8px 18px;
    border-radius: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.15s;
  }
  .generate-btn:hover { background: var(--accent2); transform: translateY(-1px); }

  .main {
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 0;
    min-height: calc(100vh - 73px);
  }

  .planner {
    padding: 32px 40px;
    border-right: 1px solid var(--border);
  }

  .week-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    margin-bottom: 32px;
  }

  .day-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .day-card:hover { border-color: var(--accent); }
  .day-card.friday-card { border-color: rgba(232,184,75,0.3); }
  .day-card.friday-card:hover { border-color: var(--accent); }

  .day-header {
    padding: 10px 14px 8px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .day-name {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .friday-card .day-name { color: var(--accent); }

  .day-date {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    opacity: 0.6;
  }

  .day-meal {
    padding: 14px;
  }

  .meal-name {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 8px;
    color: var(--text);
  }

  .meal-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 10px;
  }

  .tag {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.5px;
    padding: 2px 7px;
    border-radius: 3px;
    text-transform: uppercase;
  }

  .tag-chicken { background: rgba(160,92,42,0.25); color: #d4895a; border: 1px solid rgba(160,92,42,0.4); }
  .tag-taco { background: rgba(74,122,58,0.25); color: #7ab86a; border: 1px solid rgba(74,122,58,0.4); }
  .tag-fish { background: rgba(42,90,122,0.25); color: #5a9abe; border: 1px solid rgba(42,90,122,0.4); }
  .tag-pasta { background: rgba(106,74,138,0.25); color: #9a7ac8; border: 1px solid rgba(106,74,138,0.4); }
  .tag-burger { background: rgba(122,58,58,0.25); color: #c87a7a; border: 1px solid rgba(122,58,58,0.4); }
  .tag-shabbat { background: rgba(138,122,42,0.25); color: #c8b85a; border: 1px solid rgba(138,122,42,0.4); }
  .tag-veg { background: rgba(58,122,90,0.25); color: #6ab895; border: 1px solid rgba(58,122,90,0.4); }
  .tag-quick { background: rgba(74,127,165,0.2); color: #7ab0d4; border: 1px solid rgba(74,127,165,0.3); }
  .tag-soup { background: rgba(165,100,74,0.25); color: #d4905a; border: 1px solid rgba(165,100,74,0.4); }

  .shop-tag {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--text-muted);
    letter-spacing: 0.5px;
  }
  .shop-tj { color: #c45c3a; }
  .shop-costco { color: #4a7fa5; }
  .shop-wf { color: #5a8f6a; }

  .meal-actions {
    display: flex;
    gap: 6px;
    margin-top: 10px;
  }

  .action-btn {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    padding: 4px 9px;
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    transition: all 0.15s;
    border: 1px solid;
    flex: 1;
    text-align: center;
  }

  .btn-swap {
    background: transparent;
    border-color: var(--border);
    color: var(--text-muted);
  }
  .btn-swap:hover { border-color: var(--accent); color: var(--accent); }

  .btn-alexa {
    background: rgba(74,127,165,0.15);
    border-color: rgba(74,127,165,0.4);
    color: #7ab0d4;
  }
  .btn-alexa:hover { background: rgba(74,127,165,0.3); }

  /* Shabbat special */
  .shabbat-badge {
    display: flex;
    align-items: center;
    gap: 5px;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    color: var(--accent);
  }
  .shabbat-badge .star { font-size: 11px; }

  /* Sidebar */
  .sidebar {
    padding: 28px 28px;
    display: flex;
    flex-direction: column;
    gap: 28px;
  }

  .sidebar-section h3 {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  /* Grocery list */
  .grocery-store-group { margin-bottom: 18px; }

  .store-name {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .store-name.tj { color: #c45c3a; }
  .store-name.costco { color: #4a7fa5; }
  .store-name.wf { color: #5a8f6a; }
  .store-name.safeway { color: #9a7ac8; }

  .store-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: currentColor;
  }

  .ingredient-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 0;
    border-bottom: 1px solid rgba(46,44,40,0.5);
    font-size: 13px;
    color: var(--text);
    cursor: pointer;
    transition: color 0.15s;
  }
  .ingredient-item:hover { color: var(--accent); }
  .ingredient-item.checked { 
    text-decoration: line-through; 
    color: var(--text-muted);
    opacity: 0.5;
  }

  .ingredient-cb {
    width: 14px;
    height: 14px;
    border: 1px solid var(--border);
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 8px;
    color: var(--accent);
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .ingredient-item.checked .ingredient-cb {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--bg);
  }
  .ing-name { flex: 1; }
  .store-select {
    flex-shrink: 0;
    font-size: 10px;
    padding: 2px 4px;
    border-radius: 6px;
    border: 1px solid #444;
    background: var(--surface);
    color: #888;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
    appearance: none;
    -webkit-appearance: none;
    min-width: 62px;
    text-align: center;
  }
  .store-select:hover { border-color: #888; color: #ccc; }
  .store-select-tj      { border-color: #3a7a5a; color: #3a7a5a; }
  .store-select-costco  { border-color: #4466cc; color: #4466cc; }
  .store-select-wf      { border-color: #996633; color: #996633; }
  .store-select-safeway { border-color: #aa3333; color: #aa3333; }
  .store-select.overridden { border-color: var(--accent) !important; color: var(--accent) !important; }
  .store-select option { background: #1a1a1a; color: #ccc; }

  .alexa-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }

  .alexa-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }

  .alexa-icon {
    width: 28px;
    height: 28px;
    background: linear-gradient(135deg, #00b4d8, #0077b6);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    flex-shrink: 0;
  }

  .alexa-title {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    color: #7ab0d4;
    text-transform: uppercase;
  }

  .alexa-commands {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 200px;
    overflow-y: auto;
  }

  .alexa-cmd {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    background: var(--surface2);
    padding: 6px 10px;
    border-radius: 4px;
    line-height: 1.4;
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid transparent;
  }
  .alexa-cmd:hover { border-color: #4a7fa5; color: var(--text); }
  .alexa-cmd span { color: #7ab0d4; }

  .copy-all-btn {
    width: 100%;
    margin-top: 10px;
    background: rgba(74,127,165,0.15);
    border: 1px solid rgba(74,127,165,0.4);
    color: #7ab0d4;
    padding: 8px;
    border-radius: 5px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }
  .copy-all-btn:hover { background: rgba(74,127,165,0.3); }

  /* Recipe rotation display */
  .rotation-grid {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .rot-category {}
  .rot-cat-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .rot-items {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .rotation-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 5px 10px;
    font-size: 12px;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
  }
  .rotation-item:hover { border-color: var(--accent); color: var(--text); background: rgba(232,184,75,0.07); }
  .rotation-item-custom { display: flex; align-items: center; justify-content: space-between; gap: 4px; }
  .rotation-item-custom span { cursor: pointer; flex: 1; }
  .rot-delete-btn {
    flex-shrink: 0;
    background: none;
    border: none;
    color: #555;
    cursor: pointer;
    font-size: 10px;
    padding: 0 2px;
    line-height: 1;
    transition: color 0.15s;
  }
  .rot-delete-btn:hover { color: #cc4444; }

  .day-picker-btns {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 4px;
  }
  .day-pick-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 10px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
  }
  .day-pick-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(232,184,75,0.07); }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface2);
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 12px 20px;
    border-radius: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.5px;
    z-index: 9999;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* Swap modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    width: 420px;
    max-height: 80vh;
    overflow-y: auto;
  }

  .modal h3 {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .modal p { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }

  .modal-cats { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }

  .cat-btn {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.5px;
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    text-transform: uppercase;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    transition: all 0.15s;
  }
  .cat-btn.active, .cat-btn:hover { background: var(--accent); color: var(--bg); border-color: var(--accent); }

  .swap-options {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .swap-option {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .swap-option:hover { border-color: var(--accent); }
  .swap-option .name { font-size: 14px; font-weight: 500; }
  .swap-option .meta { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-muted); }

  .modal-close {
    position: absolute;
    top: 16px;
    right: 16px;
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 20px;
    cursor: pointer;
  }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Confirm bar */
  .confirm-btn {
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 10px 24px;
    border-radius: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    cursor: pointer;
    text-transform: uppercase;
  }
  .confirm-btn:hover { background: var(--accent2); }

  .save-btn {
    background: #4466cc;
    color: #fff;
    border: none;
    padding: 8px 18px;
    border-radius: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.15s;
  }
  .save-btn:hover { background: #5577dd; transform: translateY(-1px); }

  .history-btn {
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
    padding: 8px 18px;
    border-radius: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.15s;
  }
  .history-btn:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-1px); }

  /* ── History Full Page ── */
  .history-page {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 200;
    overflow-y: auto;
  }
  .history-page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 40px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .history-page-body {
    max-width: 860px;
    margin: 0 auto;
    padding: 32px 40px;
  }
  .history-page-empty {
    text-align: center;
    color: var(--text-muted);
    font-size: 14px;
    padding: 60px 0;
    line-height: 1.8;
  }
  .history-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 24px;
    margin-bottom: 16px;
    transition: border-color 0.15s;
  }
  .history-card:hover { border-color: #555; }
  .history-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .history-card-title {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
  }
  .history-card-meta {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .history-card-meals {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .history-card-meal {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 12px;
  }
  .history-card-meal-day {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  .history-card-meal-name { color: var(--text); }
  .history-card-actions { display: flex; gap: 8px; }
  .hca-btn {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: 6px;
    padding: 6px 14px;
    cursor: pointer;

// ─── DATE HELPERS ─────────────────────────────────────────────────────────────

function getMondayOfCurrentWeek() {
  const now = new Date();
  const day = now.getDay();
  const diff = (day === 0) ? -6 : 1 - day;
  const monday = new Date(now);
  monday.setDate(now.getDate() + diff);
  monday.setHours(0,0,0,0);
  return monday;
}

function getWeekDates(offset) {
  const base = getMondayOfCurrentWeek();
  base.setDate(base.getDate() + offset * 7);
  const days = [];
  for (let i = 0; i < 5; i++) {
    const d = new Date(base);
    d.setDate(base.getDate() + i);
    days.push(d);
  }
  return days;
}

function formatWeekLabel(dates) {
  const opts = { month: 'short', day: 'numeric' };
  return `${dates[0].toLocaleDateString('en-US', opts)} – ${dates[4].toLocaleDateString('en-US', opts)}`;
}

function formatDayDate(date) {
  return date.toLocaleDateString('en-US', { month: 'numeric', day: 'numeric' });
}

// ─── GENERATION ──────────────────────────────────────────────────────────────

function pickRandom(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function pickFriday() {
  // Bias toward chicken soup 50% of the time
  const r = Math.random();
  if (r < 0.5) return RECIPES.friday_special.find(r => r.name.includes("Chicken Soup"));
  return pickRandom(RECIPES.friday_special);
}

function generateWeekPlan() {
  // Mon: Chicken dish
  // Tue: Tacos or pasta variation
  // Wed: Something hearty (shawarma, burger, pasta)
  // Thu: Fish or pasta (lighter)
  // Fri: Shabbat/Chicken Soup always
  const pool = [
    pickRandom([...RECIPES.chicken.slice(0,6)]),
    pickRandom([...RECIPES.taco.slice(0,4)]),
    pickRandom([...RECIPES.chicken.slice(3,9), ...RECIPES.pasta.slice(0,3)]),
    pickRandom([...RECIPES.fish, ...RECIPES.pasta.slice(1,4), ...RECIPES.burger]),
    pickFriday(),
  ];
  return pool;
}

function renderGroceryList() {
  const key = getWeekKey(currentWeekOffset);
  const plan = weekPlans[key] || [];
  
  const byStore = { tj:[], costco:[], wf:[], safeway:[] };
  const seen = new Set();
  
  plan.forEach(meal => {
    (meal.ingredients || []).forEach(ing => {
      if (!seen.has(ing.item)) {
        seen.add(ing.item);
        const itemKey = `${key}-${ing.item}`;
        const effectiveStore = getEffectiveStore(itemKey, ing);
        (byStore[effectiveStore] || byStore.tj).push({ ...ing, _effectiveStore: effectiveStore });
      }
    });
  });

  const el = document.getElementById('groceryList');
  el.innerHTML = '';

  const storeOrder = [
    { key:'tj', label:"Trader Joe's", cls:'tj' },
    { key:'costco', label:'Costco', cls:'costco' },
    { key:'wf', label:'Whole Foods', cls:'wf' },
    { key:'safeway', label:'Safeway', cls:'safeway' },
  ];

  storeOrder.forEach(({ key: sk, label, cls }) => {
    if (byStore[sk].length === 0) return;
    const group = document.createElement('div');
    group.className = 'grocery-store-group';
    group.innerHTML = `<div class="store-name ${cls}"><span class="store-dot"></span>${label}</div>`;
    
    byStore[sk].forEach(ing => {
      const itemKey = `${key}-${ing.item}`;
      const checked = checkedIngredients[itemKey] ? 'checked' : '';
      const isOverridden = !!storeOverrides[itemKey];
      const div = document.createElement('div');
      div.className = `ingredient-item ${checked}`;
      div.onclick = () => toggleIngredient(itemKey, div);
      div.innerHTML = `
        <div class="ingredient-cb">${checked ? '✓' : ''}</div>
        <span class="ing-name">${ing.item}</span>
        <select class="store-select store-select-${sk}${isOverridden ? ' overridden' : ''}"
          onclick="event.stopPropagation()"
          onchange="changeStore('${itemKey}', this.value)">
          ${['tj','costco','safeway','wf'].map(s =>
            `<option value="${s}"${sk===s?' selected':''}>${STORE_LABELS[s]}</option>`
          ).join('')}
        </select>`;
      group.appendChild(div);
    });
    
    el.appendChild(group);
  });

  updateConfirmBar();
}

// ─── STORE OVERRIDES ─────────────────────────────────────────────────────────
// Keyed by weekKey-itemName, value is store override string
let storeOverrides = {};

const STORE_CYCLE = ['tj', 'costco', 'safeway', 'wf'];
const STORE_LABELS = { tj:"TJ's", costco:'Costco', safeway:'Safeway', wf:'WF' };
const STORE_CLASSES = { tj:'tj', costco:'costco', safeway:'safeway', wf:'wf' };

function changeStore(itemKey, newStore) {
  storeOverrides[itemKey] = newStore;
  renderGroceryList();
  renderAlexaCommands();
}

function getEffectiveStore(itemKey, ing) {
  return storeOverrides[itemKey] || ing.store || 'tj';
}


function toggleIngredient(itemKey, el) {
  checkedIngredients[itemKey] = !checkedIngredients[itemKey];
  if (checkedIngredients[itemKey]) {
    el.classList.add('checked');
    el.querySelector('.ingredient-cb').textContent = '✓';
  } else {
    el.classList.remove('checked');
    el.querySelector('.ingredient-cb').textContent = '';
  }
  updateConfirmBar();
}

function updateConfirmBar() {
  const key = getWeekKey(currentWeekOffset);
  const plan = weekPlans[key] || [];
  const total = new Set(plan.flatMap(m => (m.ingredients||[]).map(i => i.item))).size;
  const checked = Object.entries(checkedIngredients).filter(([k,v]) => k.startsWith(key+'-') && !v).length;
  const toAdd = total - Object.entries(checkedIngredients).filter(([k,v]) => k.startsWith(key+'-') && v).length;
  
  document.getElementById('confirmCount') && (document.getElementById('confirmCount').textContent = toAdd);
}

function renderAlexaCommands() {

  plan.forEach(meal => {
    (meal.ingredients||[]).forEach(ing => {
      if (!seen.has(ing.item)) {
        seen.add(ing.item);
        const itemKey = `${key}-${ing.item}`;
        const store = getEffectiveStore(itemKey, ing);
        const list = store === 'wf' ? 'Whole Foods' : store === 'costco' ? 'Costco' : store === 'safeway' ? 'Safeway' : "Trader Joe's";

    </div>`
  ).join('');
}

function alexaForMeal(dayIndex) {
  const key = getWeekKey(currentWeekOffset);
  const meal = weekPlans[key][dayIndex];
  if (!meal || !meal.ingredients?.length) {
    showToast('No ingredients for this meal');
    return;
  }
  const cmds = meal.ingredients.map(ing => {
    const list = ing.store === 'wf' ? 'Whole Foods' : ing.store === 'costco' ? 'Costco' : "Trader Joe's";
    return `Alexa, ask our groceries to add ${ing.item} to ${list}`;
  }).join('\n');
  copyToClipboard(cmds);
  showToast(`${meal.ingredients.length} Alexa commands copied!`);
}

function copyCmd(el, item, list) {
  const cmd = `Alexa, ask our groceries to add ${item} to ${list}`;
  copyToClipboard(cmd);
  showToast('Command copied!');
}

function copyAllCommands() {
  const cmds = document.querySelectorAll('.alexa-cmd');
  const text = [...cmds].map(c => c.textContent.trim().replace(/\s+/g,' ')).join('\n');
  copyToClipboard(text);
  showToast('All commands copied to clipboard!');
}

function confirmPlan() {
  const key = getWeekKey(currentWeekOffset);
  const plan = weekPlans[key] || [];
  const seen = new Set();
  const items = [];
  plan.forEach(meal => {
    (meal.ingredients||[]).forEach(ing => {
      const itemKey = `${key}-${ing.item}`;
      if (!seen.has(ing.item) && !checkedIngredients[itemKey]) {
        seen.add(ing.item);
        const store = getEffectiveStore(itemKey, ing);
        const list = store === 'wf' ? 'Whole Foods' : store === 'costco' ? 'Costco' : store === 'safeway' ? 'Safeway' : "Trader Joe's";
        items.push(`Alexa, ask our groceries to add ${ing.item} to ${list}`);
      }
    });
  });
  copyToClipboard(items.join('\n'));
  showToast(`✓ ${items.length} Alexa commands ready — paste & run!`);
}

function copyToClipboard(text) {
  navigator.clipboard.writeText(text).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  });
}

function showToast(msg) {

const Store = {
  async get(key) {
    try {
      if (window.storage) {
        const result = await window.storage.get(key);
        return result ? result.value : null;
      }
    } catch(e) {}
    try { return localStorage.getItem(key); } catch(e) {}
    return null;
  },
  async set(key, value) {
    try {
      if (window.storage) await window.storage.set(key, value);
    } catch(e) {}
    try { localStorage.setItem(key, value); } catch(e) {}
  }
};
function loadCustomRecipes() {
  customRecipes = [];
  Store.get('mealos-custom-recipes').then(raw => {
    if (raw) {
      try {
        customRecipes = JSON.parse(raw);
        customRecipes.forEach(({ name, cat }) => {
          if (!RECIPES[cat]) RECIPES[cat] = [];
          if (!RECIPES[cat].find(r => r.name === name)) {
            RECIPES[cat].push({ name, tags:[cat,'custom'], shop:null, ingredients:[], custom:true });
          }
        });
        renderRotationGrid();
      } catch(e) {}
    }
  });
}

function persistCustomRecipes() {
  Store.set('mealos-custom-recipes', JSON.stringify(customRecipes));
}

  document.getElementById('quickAddDay').textContent = `What are you making ${DAYS[dayIndex]}?`;
  const key = getWeekKey(currentWeekOffset);
  const existing = weekPlans[key]?.[dayIndex];
  document.getElementById('quickAddInput').value = existing?.custom ? existing.name : '';
  document.getElementById('quickAddModal').classList.add('open');
  setTimeout(() => document.getElementById('quickAddInput').focus(), 80);
}

function closeQuickAddModal(e) {
  if (e.target.id === 'quickAddModal') document.getElementById('quickAddModal').classList.remove('open');
}

function confirmQuickAdd() {
  const name = document.getElementById('quickAddInput').value.trim();
  if (!name) return;
  const key = getWeekKey(currentWeekOffset);
  if (!weekPlans[key]) weekPlans[key] = Array(5).fill(null);
  weekPlans[key][quickAddDayIndex] = { name, tags:['custom'], shop:null, ingredients:[], custom:true };
  document.getElementById('quickAddModal').classList.remove('open');
  persistWeekPlans();
  renderWeek();
  showToast(`"${name}" added!`);
}

function openAddLibraryModal() {
  document.getElementById('libraryNameInput').value = '';
  document.getElementById('libraryCatInput').value = 'chicken';
  document.getElementById('addLibraryModal').classList.add('open');
  setTimeout(() => document.getElementById('libraryNameInput').focus(), 80);
}

function closeAddLibraryModal(e) {
  if (e.target.id === 'addLibraryModal') document.getElementById('addLibraryModal').classList.remove('open');
}

function confirmAddLibrary() {
  const name = document.getElementById('libraryNameInput').value.trim();
  const cat = document.getElementById('libraryCatInput').value;
  if (!name) { showToast('Please enter a meal name'); return; }

  const recipe = { name, tags:[cat, 'custom'], shop:null, ingredients:[], custom:true };
  if (!RECIPES[cat]) RECIPES[cat] = [];
  RECIPES[cat].push(recipe);
  customRecipes.push({ name, cat });
  persistCustomRecipes();

  document.getElementById('addLibraryModal').classList.remove('open');
  renderRotationGrid();
  showToast(`"${name}" added to ${cat} rotation!`);
}



let savedWeeks = [];

function loadHistory() {
  savedWeeks = [];
  Store.get('mealos-history').then(raw => {
    if (raw) {
      try { savedWeeks = JSON.parse(raw); } catch(e) {}
    }
  });
}

function persistHistory() {
  Store.set('mealos-history', JSON.stringify(savedWeeks));
}

function saveWeekSnapshot() {
  const key = getWeekKey(currentWeekOffset);
  const plan = weekPlans[key];
  if (!plan || plan.every(m => !m)) {
    showToast('Generate a plan first!');
    return;
  }

  // Build grocery snapshot with current store overrides
  const byStore = { tj:[], costco:[], wf:[], safeway:[] };
  const seen = new Set();
  plan.forEach(meal => {
    (meal?.ingredients || []).forEach(ing => {
      if (!seen.has(ing.item)) {
        seen.add(ing.item);
        const itemKey = `${key}-${ing.item}`;
        const store = getEffectiveStore(itemKey, ing);
        (byStore[store] || byStore.tj).push(ing.item);
      }
    });
  });

  const DAYS = ['Mon','Tue','Wed','Thu','Fri'];
  const snapshot = {
    id: Date.now(),
    weekKey: key,
    label: document.getElementById('weekLabel').textContent,
    savedOn: new Date().toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }),
    meals: plan.map((m, i) => ({ day: DAYS[i], name: m?.name || '—' })),
    grocery: byStore
  };

  // Replace if same week already saved, otherwise prepend
  const existing = savedWeeks.findIndex(s => s.weekKey === key);
  if (existing >= 0) savedWeeks.splice(existing, 1);
  savedWeeks.unshift(snapshot);
  persistHistory();
  renderHistory();
  showToast('Week saved to history!');
}

function showHistoryPage() {
  document.getElementById('historyPage').style.display = 'block';
  renderHistoryPage();
}

function hideHistoryPage() {
  document.getElementById('historyPage').style.display = 'none';
}

function renderHistory() {} // no-op, sidebar version removed

function renderHistoryPage() {
  const el = document.getElementById('historyPageList');
  if (!savedWeeks.length) {
    el.innerHTML = '<div class="history-page-empty">No saved weeks yet.<br><br>Head back and hit <strong>💾 Save Week</strong> to archive a plan.</div>';
    return;
  }

  const STORE_INFO = [
    { key:'tj', label:"Trader Joe's", cls:'tj' },
    { key:'costco', label:'Costco', cls:'costco' },
    { key:'wf', label:'Whole Foods', cls:'wf' },
    { key:'safeway', label:'Safeway', cls:'safeway' },
  ];

  el.innerHTML = savedWeeks.map(s => {
    const mealsHtml = s.meals.map(m => `
      <div class="history-card-meal">
        <div class="history-card-meal-day">${m.day}</div>
        <div class="history-card-meal-name">${m.name}</div>
      </div>`).join('');

    const groceryHtml = STORE_INFO.filter(si => s.grocery[si.key]?.length).map(si => `
      <div class="snapshot-store-group">
        <div class="snapshot-store-name ${si.cls}">${si.label}</div>
        ${s.grocery[si.key].map(item => `<div class="snapshot-ing">· ${item}</div>`).join('')}
      </div>`).join('');

    return `
      <div class="history-card">
        <div class="history-card-header">
          <div>
            <div class="history-card-title">${s.label}</div>
            <div class="history-card-meta">Saved ${s.savedOn}</div>
          </div>
          <div class="history-card-actions">
            <button class="hca-btn" onclick="viewSnapshotFromPage(${s.id})">🖨 Print</button>
            <button class="hca-btn del" onclick="deleteSnapshotFromPage(${s.id})">✕ Delete</button>
          </div>
        </div>
        <div class="history-card-meals">${mealsHtml}</div>
        <details style="margin-top:4px">
          <summary style="font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);cursor:pointer;user-select:none;">Grocery List</summary>
          <div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:16px">${groceryHtml}</div>
        </details>
      </div>`;
  }).join('');
}

function viewSnapshotFromPage(id) {
  viewSnapshot(id);
}

function deleteSnapshotFromPage(id) {
  savedWeeks = savedWeeks.filter(s => s.id !== id);
  persistHistory();
  renderHistoryPage();
  showToast('Removed from history');
}

function viewSnapshot(id) {
  const s = savedWeeks.find(w => w.id === id);
  if (!s) return;

  const STORE_INFO = [
    { key:'tj', label:"Trader Joe's", cls:'tj' },
    { key:'costco', label:'Costco', cls:'costco' },
    { key:'wf', label:'Whole Foods', cls:'wf' },
    { key:'safeway', label:'Safeway', cls:'safeway' },
  ];

  const mealsHtml = s.meals.map(m => `
    <div class="snapshot-day">
      <span class="snapshot-day-name">${m.day}</span>
      <span class="snapshot-meal-name">${m.name}</span>
    </div>`).join('');

  const groceryHtml = STORE_INFO.filter(si => s.grocery[si.key]?.length).map(si => `
    <div class="snapshot-store-group">
      <div class="snapshot-store-name ${si.cls}">${si.label}</div>
      ${s.grocery[si.key].map(item => `<div class="snapshot-ing">· ${item}</div>`).join('')}
    </div>`).join('');

  document.getElementById('snapshotContent').innerHTML = `
    <div class="snapshot-week-title">${s.label}</div>
    <div class="snapshot-saved-on">Saved ${s.savedOn}</div>
    ${mealsHtml}
    <hr class="snapshot-divider">
    <div class="snapshot-ingredients-title">Grocery List</div>
    ${groceryHtml}
  `;
  document.getElementById('snapshotModal').classList.add('open');
}

function closeSnapshotModal(e) {
  if (e.target.id === 'snapshotModal') document.getElementById('snapshotModal').classList.remove('open');
}

function deleteSnapshot(id) {
  savedWeeks = savedWeeks.filter(s => s.id !== id);
  persistHistory();
  if (document.getElementById('historyPage').style.display !== 'none') renderHistoryPage();
  showToast('Removed from history');
}

function printSnapshot() {
  const content = document.getElementById('snapshotContent').innerHTML;
  const win = window.open('', '_blank');
  win.document.write(`
    <html><head><title>Meal Plan</title>
    <style>
      body { font-family: Georgia, serif; padding: 40px; color: #111; max-width: 560px; margin: 0 auto; }
      h2 { font-size: 20px; margin-bottom: 4px; }
      .snapshot-saved-on { color: #888; font-size: 12px; margin-bottom: 20px; }
      .snapshot-day { display: flex; gap: 12px; margin-bottom: 6px; }
      .snapshot-day-name { font-weight: bold; width: 36px; color: #555; font-size: 13px; text-transform: uppercase; }
      .snapshot-meal-name { font-size: 14px; }
      hr { border: none; border-top: 1px solid #ddd; margin: 16px 0; }
      .snapshot-ingredients-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #888; margin-bottom: 10px; }
      .snapshot-store-group { margin-bottom: 12px; }
      .snapshot-store-name { font-size: 12px; font-weight: bold; color: #333; margin-bottom: 4px; }
      .snapshot-ing { font-size: 13px; padding: 1px 0 1px 10px; color: #444; }
      .snapshot-week-title { font-size: 18px; font-weight: bold; margin-bottom: 4px; }
    </style></head>
    <body>${content}</body></html>`);
  win.document.close();
  win.print();
}

// ─── INIT ─────────────────────────────────────────────────────────────────────

function persistWeekPlans() {
  Store.set('mealos-weekplans', JSON.stringify(weekPlans));
}

function loadWeekPlans() {
  return Store.get('mealos-weekplans').then(raw => {
    if (raw) {
      try { weekPlans = JSON.parse(raw); } catch(e) {}
    }
  }).catch(() => {});
}

loadWeekPlans().then(() => {
  // Auto-generate current week if empty
  const key = getWeekKey(currentWeekOffset);
  if (!weekPlans[key]) {
    weekPlans[key] = generateWeekPlan();
    persistWeekPlans();
  }
  renderWeek();
  loadHistory();
  loadCustomRecipes();
});
</script>
